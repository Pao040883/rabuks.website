name: Orchestrator Contracts

on:
  push:
  pull_request:

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate lightweight template release metadata
        run: |
          VERSION="$(tr -d '[:space:]' < ORCHESTRATOR_VERSION)"
          echo "$VERSION" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$'
          grep -F "## $VERSION - " CHANGELOG.md

      - name: Run orchestrator regression suite
        run: python -m unittest discover -s tests